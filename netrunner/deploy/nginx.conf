server {
    listen 80;
    server_name netrunner.example.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name netrunner.example.de;

    ssl_certificate /etc/letsencrypt/live/netrunner.example.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/netrunner.example.de/privkey.pem;

    # Frontend static files
    location / {
        root /var/www/netrunner/frontend/dist;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
